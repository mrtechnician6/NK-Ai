<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NK AI | Universal Mentor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <nav id="drawer" class="drawer">
        <div class="drawer-header">
            <h3>NK AI Menu</h3>
        </div>
        <ul>
            <li onclick="resetProfile()"><i class="material-icons">refresh</i> Reset Profile</li>
            <li><i class="material-icons">person</i> View Profile</li>
            <li><i class="material-icons">settings</i> Settings</li>
        </ul>
    </nav>

    <main id="main-content">
        <header>
            <button id="menu-btn" class="icon-btn"><i class="material-icons">menu</i></button>
            <h1>NK AI</h1>
        </header>

        <div id="chat-container">
            <div id="messages"></div>
            <div id="typing-indicator" class="hidden">NK AI is thinking...</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message...">
            <button id="send-btn" class="icon-btn"><i class="material-icons">send</i></button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
